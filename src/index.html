<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discover Cambodia | Home</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- JavaScript -->
    <script src="js/main.js" type="module"></script>
  </head>

  <body>
    <!-- HEADER -->
    <header id="main-header" class="divider"></header>

    <!-- MAIN -->
    <main class="divider">
      <!-- HERO -->
      <section class="hero">
        <!-- HERO IMAGE -->
        <img
          class="hero-img"
          src="images/cambodia-large.webp"
          srcset="images/cambodia-large.webp 500w, images/cambodia-large.webp 1200w"
          alt="Angkor What Temple"
        />

        <!-- CENTER LOGO -->
        <div class="logo logo--square">
          <img src="images/discover-cambodia.svg" alt="Discover Cambodia Image" />

          <div>Come Explore Cambodia</div>
        </div>

        <!-- MISSION -->
        <div class="mission">
          <p>
            My mission is to provide travelers with the tools to explore traditional tourist sites as well as discovering something new.
          </p>
        </div>
      </section>

      <!-- PRODUCTS -->
      <section class="products">
        <ul class="product-grid">
          <li>
            <a href="temples/index.html">
              <img src="images/temples.svg" alt="Temples" />
              <h2>Temples</h2>
            </a>
          </li>
          <li>
            <!-- <a href="beyond-temples/index.html"> -->
              <img src="images/explore-cambodia.svg" alt="explore" />
              <h2>Beyond the Temples</h2>
            <!-- </a> -->
          </li>
          <li>
            <a href="tools/index.html">
              <img src="images/tools.svg" alt="Tools" />
              <h2>Tools</h2>
            </a>
          </li>
        </ul>
      </section>
    
    
    </main>

    <!-- FOOTER -->
    <footer id="main-footer"></footer>

  </body>
</html>
