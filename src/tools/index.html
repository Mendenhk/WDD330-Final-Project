<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Products</title>
    <link rel="stylesheet" href="/src/css/styles.css" />
    <script src="/src/js/tools.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="tools">
      <section class="currency-converter">
        <select id="currency">
          <option value="USD">US Dollar (USD)</option>
          <option value="KHR">Cambodian Riel (KHR)</option>
        </select>
        <input type="number" id="amount" placeholder="Amount"/>
        <button id="convert-btn">Convert</button>
        <p id="dollar-riel">Cambodian Riel (KHR)</p>
        <p id="result"></p>
      </section>
      <section class="weather">
        <h2>Weather</h2>
      <!--partly cloudy iphone icon (small window)-->
      <img class="weatherSVG">
      <ul class="r-justify-list">
        <li>Temperature: </li>
        <li>Condition: </li>
        <li>Wind: </li>
        <li>Wind Chill: </li>
      </ul>
      <ul class="l-justify-list">
        <li class="temperature">Loading...</li>
        <li class="conditions">Loading...</li>
        <li class="windSpeed">Loading...</li>
        <li class="wind-chill">32°C</li>
      </ul>
      </section>
      <section class="language">

      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
