<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discover Cambodia | Beyond Temples</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <script src="../js/beyond-temples.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>
  <main class="divider">
    <section class="products">
      <div class="products-header">
        <h1>
          Beyond Temples: <span class="title highlight"></span>
        </h1>

        <label for="category">Filter by Category:
          <select name="category" id="category">
            <option value="all">All</option>
            <option value="food">Food</option>
            <option value="nature">Nature</option>
            <option value="culture">Culture</option>
            <option value="history">History</option>
            <option value="recreation">Recreation</option>
          </select>
        </label>

        <!-- Sort button -->
        <a class="name-sort-button" id="sort-by-distance">
          Sort by distance from Siem Reap
        </a>

      </div>
      <ul class="temple-list"></ul>
    </section>
  </main>
  <footer id="main-footer"></footer>
</body>

</html>
