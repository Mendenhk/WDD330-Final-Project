<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Temples of Angkor — Map</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/mapbox-gl/3.6.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/mapbox-gl/3.6.0/mapbox-gl.js"></script>
<style>
  :root{
    --jungle: #1f3d2e;
    --gold: #c9a14a;
    --cream: #f4efe2;
    --clay: #b5573a;
    --ink: #2b2620;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: "Georgia", "Times New Roman", serif; color: var(--ink); }

  header {
    background: var(--jungle);
    color: var(--cream);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: "Trebuchet MS", sans-serif;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    z-index: 2;
    position: relative;
  }
  header h1 {
    margin: 0;
    font-size: 1.25rem;
    letter-spacing: 0.06em;
    font-family: "Georgia", serif;
    font-weight: normal;
  }
  header h1 span { color: var(--gold); }

  #map {
    position: absolute;
    top: 56px;
    bottom: 0;
    left: 0;
    right: 0;
  }

  /* Temple marker */
  .marker {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--cream);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<header>
  <h1>Temples of Angkor <span>— Map</span></h1>
</header>

<div id="map"></div>

<script>
  // === Mapbox setup ===
  // Get a free token at https://account.mapbox.com/access-tokens/
  // Replace the placeholder string below with your real token (starts with "pk.")
  mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN_HERE';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/outdoors-v12',
    center: [103.95, 13.45], // centered to cover the temple spread
    zoom: 7.5
  });

  map.addControl(new mapboxgl.NavigationControl(), 'top-right');

  // === Temples data ===
  const temples = [
    { "id": 1, "name": "Angkor Wat", "lat": 13.41250, "lng": 103.86667 },
    { "id": 2, "name": "Ta Prohm", "lat": 13.43500, "lng": 103.88917 },
    { "id": 3, "name": "Angkor Thom", "lat": 13.44167, "lng": 103.85833 },
    { "id": 4, "name": "Bayon Temple", "lat": 13.44139, "lng": 103.85917 },
    { "id": 5, "name": "Phnom Bakheng", "lat": 13.42418, "lng": 103.85601 },
    { "id": 6, "name": "Banteay Srei", "lat": 13.59889, "lng": 103.96278 },
    { "id": 7, "name": "Phnom Krom", "lat": 13.27500, "lng": 103.83500 },
    { "id": 8, "name": "Temple of Preah Vihear", "lat": 14.39056, "lng": 104.68028 },
    { "id": 9, "name": "Koh Ker", "lat": 13.79000, "lng": 104.56500 },
    { "id": 10, "name": "Beng Mealea", "lat": 13.47639, "lng": 104.23833 },
    { "id": 11, "name": "Prasat Wat (Wat Athvea)", "lat": 13.32360, "lng": 103.84100 },
    { "id": 12, "name": "Preah Khan", "lat": 13.45917, "lng": 103.85972 }
  ];

  // === Build markers ===
  temples.forEach(temple => {
    const el = document.createElement('div');
    el.className = 'marker';
    el.title = temple.name;

    new mapboxgl.Marker(el)
      .setLngLat([temple.lng, temple.lat])
      .addTo(map);
  });
</script>

</body>
</html>
